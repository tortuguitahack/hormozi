<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta property="og:title" content="DIHACKTOR Ω — Marketing | 1M Productos @ $6.99"><meta property="og:description" content="Catálogo de productos digitales de marketing. Agentes IA, cursos, ebooks y workflows. Precio fijo $6.99. Compra con tarjeta o crypto.">
<style>:root{--bg:#0a0a0f;--gold:#d4af37;--txt:#e8e8ee;--muted:#9a9ab0;--card:rgba(255,255,255,.04);--border:rgba(212,175,55,.25)}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;line-height:1.6}
header{padding:40px 20px;text-align:center;border-bottom:1px solid var(--border);background:radial-gradient(circle at 50% -20%,rgba(212,175,55,.15),transparent 60%)}
h1{font-size:clamp(1.6rem,4vw,2.6rem);color:var(--gold);font-weight:800}
.tag{color:var(--muted);margin-top:8px}.sub{color:var(--gold);font-weight:600;margin-top:6px}
.wrap{max-width:1100px;margin:0 auto;padding:30px 20px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.card .cat{font-size:.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.card h3{font-size:1rem;margin:6px 0;line-height:1.35}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.price{font-size:1.3rem;font-weight:800;color:var(--gold)}.btn{background:var(--gold);color:#000;font-weight:700;padding:8px 16px;border-radius:8px;text-decoration:none}
footer{border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--muted);font-size:.8rem;margin-top:30px}
input{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:10px 14px;border-radius:10px;width:100%;margin-bottom:16px}</style></head>
<body><header><h1>DIHACKTOR Ω — Marketing | 1M Productos @ $6.99</h1><p class="tag">Catálogo Marketing</p><p class="sub">1,000,000 productos · $6.99 USD · Tarjeta o crypto</p></header>
<main class="wrap"><input id="s" placeholder="Buscar..."><div id="g" class="grid"><p style="color:var(--muted)">Cargando...</p></div></main>
<footer>DIHACKTOR Ω · Catálogo Marketing</footer>
<script>
const API="https://tries-lace-computing-dude.trycloudflare.com/api/master",BUY=p=>`https://tries-lace-computing-dude.trycloudflare.com/go?e=EXP-0001&p={uid}&m=whop`;let off=0,q="";
async function load(){const r=await fetch(`${API}/products?limit=30&offset=${off}${q?'&q='+encodeURIComponent(q):''}`);const d=await r.json();
document.getElementById('g').innerHTML='';(d.products||[]).forEach(p=>{const c=document.createElement('div');c.className='card';
c.innerHTML=`<div class="cat">${p.category||p.ecosystem}</div><h3>${p.title}</h3><div class="meta"><span class="price">$6.99</span><a class="btn" href="${BUY(p.uid)}" target="_blank">COMPRAR</a></div>`;document.getElementById('g').appendChild(c);});off+=30;}
document.getElementById('s').oninput=e=>{q=e.target.value;off=0;load();};load();
</script></body></html>
